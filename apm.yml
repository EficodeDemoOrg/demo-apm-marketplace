name: demo-apm-marketplace
version: 0.1.0
description: An APM marketplace for demonstration purposes.
marketplace:
  owner:
    name: EficodeDemoOrg
    url: https://github.com/EficodeDemoOrg

  # Default tag pattern used to resolve version ranges for each package.
  build:
    tagPattern: "v{version}"

  packages:
    - name: demo-apm-package
      description: A demo APM package for demonstration purposes.
      source: EficodeDemoOrg/demo-apm-package
      version: "^1.0.0"
